<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access Official Updates Directly On Telegram - Fast access to important updates and information.">
    <title>PZP - Official Telegram Channel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Background Elements -->
        <div class="background">
            <div class="orb orb-blue"></div>
            <div class="orb orb-gold"></div>
            <div class="particles-container" id="particles"></div>
            <svg class="pattern" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="target-pattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
                        <circle cx="40" cy="40" r="35" fill="none" stroke="#0EA5E9" stroke-width="0.5" opacity="0.05"/>
                        <circle cx="40" cy="40" r="25" fill="none" stroke="#0EA5E9" stroke-width="0.5" opacity="0.08"/>
                        <circle cx="40" cy="40" r="15" fill="none" stroke="#0EA5E9" stroke-width="0.5" opacity="0.1"/>
                        <circle cx="40" cy="40" r="5" fill="#0EA5E9" opacity="0.15"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#target-pattern)"/>
            </svg>
        </div>

        <!-- Hero Content -->
        <div class="hero" id="hero-section">
            <!-- Logo -->
            <div class="logo-wrapper">
                <div class="logo-glow"></div>
                <img src="assets/logo/pzp-logo.png" alt="PZP Logo" class="logo">
                <div class="light-sweep"></div>
            </div>

            <!-- Premium Badge -->
            <div class="premium-badge">Official Access</div>

            <!-- Headline -->
            <h1 class="headline">
                <span class="headline-line-1">Official Updates</span><br><span class="headline-line-2">Delivered Instantly</span>
            </h1>

            <!-- Subtitle -->
            <p class="subtitle">
                Access updates directly through Telegram.
            </p>

            <!-- CTA Button -->
            <a href="https://t.me/+hG27Gt41OrhmYTM1" class="telegram-button" target="_blank" rel="noopener noreferrer">
                <svg class="telegram-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12-5.37-12-12-12zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.16.16-.295.295-.605.295-.393 0-.322-.147-.453-.52l-1.212-3.98-3.13-.98c-.68-.215-.688-.688.147-.986l12.2-4.709c.56-.23.883-.053.883.627z" fill="white"/>
                </svg>
                <span>OPEN TELEGRAM</span>
            </a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
